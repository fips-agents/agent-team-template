[allowlist]
  description = "Project-specific allowlist for false positives"

  paths = [
    '''\/examples\/''',
    '''\/tests?\/fixtures\/''',
    '''docs\/.*\.md$''',
    '''commands\/.*\.md$''',
  ]

  regexes = [
    '''YOUR_.*_HERE''',
    '''REPLACE_WITH_YOUR''',
    '''<your-.*-here>''',
  ]
